name: Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-northeast-1
  TF_VERSION: '1.12'

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Untaint tainted resources
        # tainted リソースは destroy→recreate が試みられ、read 権限不足で失敗することがある。
        # untaint することで通常の apply フローに戻す。
        # taint されていない場合は exit 1 になるため continue-on-error で無視する。
        continue-on-error: true
        run: terraform untaint aws_cloudwatch_log_group.lambda

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -refresh=false -out=tfplan

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const fullPlan = process.env.PLAN_OUTPUT || '';
            const truncated = fullPlan.length > 60000;
            const plan = fullPlan.slice(0, 60000);
            const body = [
              '#### Terraform Plan',
              truncated ? '⚠️ Plan output was truncated (exceeds 60,000 characters)' : '',
              '<details><summary>Show Plan</summary>',
              '',
              '```',
              plan,
              '```',
              '',
              '</details>',
            ].filter(Boolean).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
